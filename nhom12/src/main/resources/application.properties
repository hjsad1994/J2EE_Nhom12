spring.application.name=nhom12


# Frontend URL (used for OAuth2 success redirect)
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080}
app.websocket.allowed-origin-patterns=${APP_WEBSOCKET_ALLOWED_ORIGIN_PATTERNS:${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080}}
app.oauth2.failure-url=${APP_OAUTH2_FAILURE_URL:${APP_FRONTEND_URL:http://localhost:5173}/login?error=google_failed}
absa.api-url=${ABSA_API_URL:http://localhost:9000}

# Server
server.port=${SERVER_PORT:8080}

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/nhom12}
spring.data.mongodb.auto-index-creation=true

# JWT
jwt.secret=${JWT_SECRET:nhom12-super-secret-key-must-be-at-least-256-bits-long-for-hs256}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# File upload limit
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Jackson
spring.jackson.default-property-inclusion=NON_NULL

# Email (Gmail SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:YOUR_EMAIL@gmail.com}
spring.mail.password=${MAIL_PASSWORD:YOUR_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# MoMo Payment Gateway
momo.partner-code=${MOMO_PARTNER_CODE:}
momo.access-key=${MOMO_ACCESS_KEY:}
momo.secret-key=${MOMO_SECRET_KEY:}
momo.api-url=${MOMO_API_URL:https://test-payment.momo.vn/v2/gateway/api/create}
momo.ipn-url=${MOMO_IPN_URL:http://localhost:8080/momo/ipn}
momo.redirect-url=${MOMO_REDIRECT_URL:http://localhost:8080/momo/return}
