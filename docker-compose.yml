services:
  backend:
    build:
      context: ./nhom12
      dockerfile: Dockerfile
    container_name: veritashop-backend
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      MONGODB_URI: ${MONGODB_URI}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      APP_WEBSOCKET_ALLOWED_ORIGIN_PATTERNS: ${APP_WEBSOCKET_ALLOWED_ORIGIN_PATTERNS:-${APP_CORS_ALLOWED_ORIGINS}}
      APP_OAUTH2_FAILURE_URL: ${APP_OAUTH2_FAILURE_URL:-${APP_FRONTEND_URL}/login?error=google_failed}
      ABSA_API_URL: ${ABSA_API_URL:-http://host.docker.internal:9000}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      APP_EMAIL_PROVIDER: ${APP_EMAIL_PROVIDER:-smtp}
      APP_EMAIL_FROM: ${APP_EMAIL_FROM:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_API_URL: ${RESEND_API_URL:-https://api.resend.com/emails}
      MOMO_PARTNER_CODE: ${MOMO_PARTNER_CODE:-}
      MOMO_ACCESS_KEY: ${MOMO_ACCESS_KEY:-}
      MOMO_SECRET_KEY: ${MOMO_SECRET_KEY:-}
      MOMO_API_URL: ${MOMO_API_URL:-https://test-payment.momo.vn/v2/gateway/api/create}
      MOMO_IPN_URL: ${MOMO_IPN_URL}
      MOMO_REDIRECT_URL: ${MOMO_REDIRECT_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - veritashop

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_ABSA_API_BASE_URL: ${VITE_ABSA_API_BASE_URL:-/absa-api}
        VITE_BACKEND_URL: ${VITE_BACKEND_URL}
    container_name: veritashop-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - veritashop

  caddy:
    image: caddy:2.10
    container_name: veritashop-caddy
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    environment:
      FRONTEND_DOMAIN: ${FRONTEND_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - veritashop

volumes:
  caddy_data:
  caddy_config:

networks:
  veritashop:
    driver: bridge
